aid: lego
name: Lego
description: >-
  The LEGO Group is a Danish toy company and the world's largest manufacturer
  of interlocking plastic building bricks. The company extends its brand across
  video games, theme parks, movies, educational products, and licensed sets for
  children and adults. LEGO does not currently publish a public developer API
  or developer portal; consumer-facing systems and partner integrations are
  closed. A public GitHub organization hosts internal engineering tooling and
  open-source contributions.
